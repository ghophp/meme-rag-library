<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meme RAG Library</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>Meme RAG Library</h1>
    <p class="subtitle">Semantic search through your memes using AI embeddings</p>
  </header>

  <main>
    <section class="search-section">
      <div class="search-bar">
        <input
          type="text"
          id="searchInput"
          placeholder="Search memes semantically... (e.g. 'mind blow', 'confused cat')"
          autocomplete="off"
        >
        <button id="searchBtn">Search</button>
        <button id="clearBtn" class="secondary" style="display:none">Clear</button>
      </div>
      <div class="search-options">
        <label><input type="checkbox" id="useHyde"> HyDE (query expansion)</label>
        <label><input type="checkbox" id="useKeyword"> Keyword search</label>
      </div>
    </section>

    <section class="upload-section">
      <div class="upload-area" id="uploadArea">
        <input type="file" id="fileInput" accept="image/*" multiple hidden>
        <p>Drop memes here or <button id="browseBtn" class="link-btn">browse</button></p>
      </div>
      <div id="uploadStatus" class="upload-status" style="display:none">
        <div class="spinner"></div>
        <span>Analyzing meme with AI...</span>
      </div>
    </section>

    <section class="gallery-section">
      <div id="gallery" class="gallery"></div>
      <p id="emptyState" class="empty-state" style="display:none">
        No memes yet. Upload some to get started!
      </p>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
